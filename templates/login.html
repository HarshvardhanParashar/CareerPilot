{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card card-custom p-4">

            <h2 class="text-center mb-4">
                Welcome Back
            </h2>

            <div class="text-center mt-3">
                Don't have an account?
                <a href="/register">Register</a>
            </div>
            <form method="POST">

                <div class="mb-3">
                    <label>Email</label>
                    <input
                        type="email"
                        class="form-control"
                        name="email"
                        required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        required>
                </div>

                <button class="btn btn-primary w-100">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
