{% extends "base.html" %}

{% block title %}Users{% endblock %}

{% block content %}

<h2 class="mb-4">Registered Users</h2>

<div class="card card-custom p-4">

    <table class="table table-dark table-hover">

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Created</th>
            </tr>
        </thead>

        <tbody>

        {% for user in users %}

            <tr>
                <td>{{ user[0] }}</td>
                <td>{{ user[1] }}</td>
                <td>{{ user[2] }}</td>
                <td>{{ user[3] }}</td>
                <td>{{ user[4] }}</td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
