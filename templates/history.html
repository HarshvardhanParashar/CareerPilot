{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card card-custom p-4">

        <h2>Test History</h2>

        <table class="table table-hover">

            <thead>
                <tr>
                    <th>Score</th>
                    <th>Total</th>
                    <th>Percentage</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>

            {% for r in results %}

                <tr>
                    <td>{{ r[0] }}</td>
                    <td>{{ r[1] }}</td>
                    <td>{{ r[2] }}%</td>
                    <td>{{ r[3] }}</td>
                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
